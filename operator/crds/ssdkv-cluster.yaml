apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ssdkvclusters.ssdkv.io
spec:
  group: ssdkv.io
  names:
    kind: SsdkvCluster
    plural: ssdkvclusters
    singular: ssdkvcluster
    shortNames:
      - skc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 64
                  default: 3
                  description: Number of SSD-KV nodes in the cluster.
                replicationFactor:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 2
                  description: Number of copies of each shard (including primary).
                storage:
                  type: object
                  properties:
                    size:
                      type: string
                      default: "10Gi"
                      description: Size of the PersistentVolumeClaim for each node.
                    storageClass:
                      type: string
                      description: StorageClass for the PVCs. Defaults to cluster default.
                image:
                  type: string
                  default: "ssd-kv:latest"
                  description: Container image for the SSD-KV server.
                redisPort:
                  type: integer
                  default: 7777
                  description: Port for Redis-compatible client connections.
                clusterPort:
                  type: integer
                  default: 7780
                  description: Port for inter-node cluster communication.
                replicaRead:
                  type: boolean
                  default: false
                  description: Allow replica nodes to serve read requests (READONLY command).
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "1"
                        memory:
                          type: string
                          default: "2Gi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "4"
                        memory:
                          type: string
                          default: "8Gi"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Scaling, Degraded, Failed]
                readyReplicas:
                  type: integer
                topologyVersion:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
