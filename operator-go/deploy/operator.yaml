apiVersion: v1
kind: Namespace
metadata:
  name: ssdkv-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssdkv-operator
  namespace: ssdkv-system
  labels:
    app: ssdkv-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssdkv-operator
  template:
    metadata:
      labels:
        app: ssdkv-operator
    spec:
      serviceAccountName: ssdkv-operator
      containers:
        - name: operator
          image: ssdkv-operator:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
