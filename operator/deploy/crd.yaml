apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ssdkvclusters.ssdkv.io
spec:
  group: ssdkv.io
  names:
    kind: SsdkvCluster
    listKind: SsdkvClusterList
    plural: ssdkvclusters
    singular: ssdkvcluster
    shortNames:
      - ssdkv
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - image
                - resources
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 3
                replicationFactor:
                  type: integer
                  minimum: 1
                  maximum: 5
                  default: 2
                image:
                  type: string
                redisPort:
                  type: integer
                  default: 7777
                clusterPort:
                  type: integer
                  default: 7780
                replicaRead:
                  type: boolean
                  default: false
                storage:
                  type: object
                  properties:
                    size:
                      type: string
                    storageClassName:
                      type: string
                resources:
                  description: |
                    Per-node CPU and memory. The operator copies these into both
                    requests and limits so every pod is Guaranteed-QoS. CPU must
                    be a positive integer (whole cores) so the kubelet's static
                    CPU manager can pin exclusive cores. The cluster's kubelet
                    must be started with --cpu-manager-policy=static.
                  type: object
                  required:
                    - cpu
                    - memory
                  properties:
                    cpu:
                      type: string
                      pattern: '^[1-9][0-9]*$'
                      description: Whole number of cores, e.g. "2".
                    memory:
                      type: string
                      description: Per-node memory, e.g. "2Gi".
            status:
              type: object
              properties:
                phase:
                  type: string
                readyReplicas:
                  type: integer
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
