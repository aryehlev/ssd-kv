apiVersion: v1
kind: ServiceAccount
metadata:
  name: ssdkv-operator
  namespace: ssdkv-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ssdkv-operator
rules:
  - apiGroups: ["ssdkv.io"]
    resources: ["ssdkvclusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["ssdkv.io"]
    resources: ["ssdkvclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ssdkv-operator
subjects:
  - kind: ServiceAccount
    name: ssdkv-operator
    namespace: ssdkv-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ssdkv-operator
